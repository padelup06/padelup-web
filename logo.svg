<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Ellipse orbit -->
  <ellipse cx="200" cy="230" rx="130" ry="38" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Racket head (oval) -->
  <ellipse cx="248" cy="95" rx="28" ry="36" fill="none" stroke="white" stroke-width="7"/>
  <!-- Racket strings horizontal -->
  <line x1="222" y1="85" x2="274" y2="85" stroke="white" stroke-width="2.5"/>
  <line x1="221" y1="96" x2="275" y2="96" stroke="white" stroke-width="2.5"/>
  <line x1="222" y1="107" x2="274" y2="107" stroke="white" stroke-width="2.5"/>
  <!-- Racket strings vertical -->
  <line x1="236" y1="62" x2="236" y2="128" stroke="white" stroke-width="2.5"/>
  <line x1="248" y1="59" x2="248" y2="131" stroke="white" stroke-width="2.5"/>
  <line x1="260" y1="62" x2="260" y2="128" stroke="white" stroke-width="2.5"/>
  <!-- Racket handle -->
  <line x1="234" y1="128" x2="215" y2="162" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Player body — jumping figure -->
  <!-- Head -->
  <circle cx="190" cy="128" r="14" fill="white"/>
  <!-- Torso -->
  <line x1="190" y1="142" x2="185" y2="185" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Right arm raised holding racket -->
  <line x1="190" y1="152" x2="218" y2="140" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Left arm out -->
  <line x1="190" y1="152" x2="162" y2="165" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Right leg back -->
  <line x1="185" y1="185" x2="205" y2="215" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Left leg bent forward -->
  <line x1="185" y1="185" x2="168" y2="210" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="168" y1="210" x2="155" y2="225" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Ball -->
  <circle cx="278" cy="72" r="9" fill="white"/>

  <!-- Text PADELUP -->
  <text x="200" y="298" text-anchor="middle" font-family="'Arial Narrow', Arial, sans-serif" font-weight="700" font-size="52" letter-spacing="10" fill="white">PADELUP</text>

  <!-- Subtext -->
  <text x="200" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-weight="300" font-size="14" letter-spacing="5" fill="white">ELEVATE YOUR GAME</text>

  <!-- Decorative line under subtext -->
  <line x1="160" y1="338" x2="240" y2="338" stroke="white" stroke-width="1.5"/>

</svg>
